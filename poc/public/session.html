<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thinking Foundry</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e4e4e7;font-family:system-ui,sans-serif;height:100vh;display:flex;flex-direction:column}
#phase-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#111118;border-bottom:1px solid #1a1a24;font-size:13px;color:#a1a1aa}
.phase-dot{width:8px;height:8px;border-radius:50%;background:#2a2a34}.phase-dot.active{background:#6366f1;width:12px;height:12px}
#transcript{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5}
.msg.ai{align-self:flex-start;background:#1a1a24;border:1px solid #2a2a34}
.msg.user{align-self:flex-end;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3)}
.msg .label{font-size:11px;color:#71717a;margin-bottom:4px}
#controls{padding:12px 16px;background:#111118;border-top:1px solid #1a1a24;display:flex;gap:12px;align-items:center}
#pauseBtn{flex:1;padding:16px;border-radius:12px;font-size:18px;font-weight:600;border:none;cursor:pointer;background:#27272a;color:#e4e4e7}
#pauseBtn.paused{background:#6366f1;color:#fff}
#stopBtn{padding:16px 20px;border-radius:12px;background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);cursor:pointer;font-weight:600}
.live-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#waiting{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#52525b}
</style></head>
<body>
<div id="phase-bar"><div class="phase-dot active"></div><span id="phaseLabel">Phase 0: User Stories</span><span id="status" style="margin-left:auto"></span></div>
<div id="transcript"><div id="waiting">🎙️<br>Connecting...</div></div>
<div id="controls">
  <button id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
  <button id="stopBtn" onclick="endSession()">End</button>
  <span id="liveDot" style="display:none"><span class="live-dot"></span></span>
</div>
<script>
var TOKEN = window.__TF_TOKEN || '';
var PHASES = ['User Stories','Mine','Scout','Assay','Crucible','Auditor','Plan','Verify'];
var ws, audioCtx, processor, stream, paused = false, phase = 0;

function connect() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);
  ws.onopen = function() {
    ws.send(JSON.stringify({ type: 'session-setup', accessToken: TOKEN, frameworks: ['stoicism'] }));
    document.getElementById('status').textContent = 'Connecting to AI...';
  };
  ws.onmessage = function(e) {
    try {
      var msg = JSON.parse(e.data);
      if (msg.type === 'status' && msg.state === 'connected') {
        document.getElementById('waiting').style.display = 'none';
        document.getElementById('liveDot').style.display = 'inline-block';
        document.getElementById('status').innerHTML = '<span class="live-dot"></span> Live';
        startMic();
      }
      if (msg.type === 'transcript' || msg.type === 'user_transcript') {
        var speaker = msg.type === 'user_transcript' ? 'user' : (msg.role === 'model' ? 'ai' : 'user');
        var text = msg.text || '';
        if (text.trim()) addMessage(speaker, text);
      }
      if (msg.type === 'phase' || msg.type === 'phase_transition') {
        phase = msg.phase || msg.to || 0;
        document.getElementById('phaseLabel').textContent = 'Phase ' + phase + ': ' + PHASES[phase];
      }
      if (msg.type === 'status' && msg.state === 'stopped') {
        document.getElementById('status').textContent = 'Session ended';
        document.getElementById('pauseBtn').textContent = 'Session Ended';
        document.getElementById('pauseBtn').disabled = true;
      }
      if (msg.type === 'error') { addMessage('ai', 'Error: ' + msg.message); }
    } catch(err) {}
  };
  ws.onclose = function() { document.getElementById('status').textContent = 'Disconnected'; };
}

function addMessage(speaker, text) {
  var el = document.createElement('div');
  el.className = 'msg ' + speaker;
  el.innerHTML = '<div class="label">' + (speaker === 'ai' ? '🤖 AI' : '🗣️ You') + '</div>' + text;
  var t = document.getElementById('transcript');
  t.appendChild(el);
  t.scrollTop = t.scrollHeight;
}

function startMic() {
  navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true } })
    .then(function(s) {
      stream = s;
      audioCtx = new AudioContext({ sampleRate: 16000 });
      var source = audioCtx.createMediaStreamSource(stream);
      processor = audioCtx.createScriptProcessor(4096, 1, 1);
      processor.onaudioprocess = function(e) {
        if (paused || !ws || ws.readyState !== 1) return;
        var f32 = e.inputBuffer.getChannelData(0);
        var i16 = new Int16Array(f32.length);
        for (var i = 0; i < f32.length; i++) { var sv = Math.max(-1, Math.min(1, f32[i])); i16[i] = sv < 0 ? sv * 0x8000 : sv * 0x7FFF; }
        ws.send(i16.buffer);
      };
      source.connect(processor);
      processor.connect(audioCtx.destination);
    })
    .catch(function(err) { addMessage('ai', 'Microphone access denied: ' + err.message); });
}

function togglePause() {
  paused = !paused;
  if (ws) ws.send(JSON.stringify({ type: paused ? 'pause' : 'resume' }));
  document.getElementById('pauseBtn').textContent = paused ? '▶ Resume' : '⏸ Pause';
  document.getElementById('pauseBtn').className = paused ? 'paused' : '';
}

function endSession() {
  if (ws) ws.send(JSON.stringify({ type: 'stop' }));
  if (stream) stream.getTracks().forEach(function(t) { t.stop(); });
}

connect();
</script>
</body></html>
