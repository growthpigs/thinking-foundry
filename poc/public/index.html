<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>The Thinking Foundry</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- ==================== SETUP SCREEN ==================== -->
    <div id="setup-screen">
      <div class="setup-header">
        <h1>The Thinking Foundry</h1>
        <p class="setup-subtitle">8 phases. From confusion to clarity.</p>
      </div>

      <div class="setup-section">
        <label class="setup-label" for="setup-github">GitHub Repo</label>
        <div class="input-with-btn">
          <input type="url" id="setup-github" class="setup-input" placeholder="https://github.com/owner/repo">
          <button id="btn-connect-github" class="btn btn-connect">Connect</button>
        </div>
        <div id="github-status" class="connect-status"></div>

        <label class="setup-label" for="setup-files" style="margin-top: 16px;">Upload docs</label>
        <input type="file" id="setup-files" class="setup-input-file" multiple accept=".pdf,.txt,.md,.doc,.docx">
        <div id="file-list" class="file-list"></div>
      </div>

      <button id="btn-begin" class="btn btn-primary btn-begin">Start with Context</button>
      <button id="btn-skip" class="btn btn-ghost btn-skip">Start without context</button>
    </div>

    <!-- ==================== SESSION SCREEN (hidden initially) ==================== -->
    <div id="session-screen" class="hidden">
      <!-- Minimal header -->
      <header>
        <span id="phase-name">0: User Stories</span>
        <div id="connection-status" class="status disconnected"></div>
      </header>

      <!-- Outline area — key insights appear here as the conversation progresses -->
      <main id="outline">
        <div id="outline-items"></div>
      </main>

      <!-- Hidden elements needed by JS -->
      <span id="phase-desc" class="hidden"></span>
      <div id="transcript" class="hidden"></div>
      <div id="debug-panel" class="hidden">
        <span id="connection-timer">00:00</span>
        <span id="reconnect-count">0</span>
      </div>

      <!-- Controls — minimal -->
      <footer id="controls">
        <button id="btn-pause" class="btn btn-pause">
          <span class="pause-icon"></span>
          <span id="pause-label">Pause</span>
        </button>
        <button id="btn-next-phase" class="btn btn-secondary">Next</button>
        <button id="btn-stop" class="btn btn-ghost">End</button>
        <button id="btn-export" class="btn btn-secondary hidden">Export</button>
        <button id="btn-debug" class="btn btn-ghost hidden">Debug</button>
      </footer>

      <!-- Phase dots at bottom -->
      <nav id="phase-nav">
        <button class="phase-btn active" data-phase="0">0</button>
        <button class="phase-btn" data-phase="1">1</button>
        <button class="phase-btn" data-phase="2">2</button>
        <button class="phase-btn" data-phase="3">3</button>
        <button class="phase-btn" data-phase="4">4</button>
        <button class="phase-btn" data-phase="5">5</button>
        <button class="phase-btn" data-phase="6">6</button>
        <button class="phase-btn" data-phase="7">7</button>
      </nav>
    </div>
  </div>

  <!-- Export Modal -->
  <div id="export-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Export Session</h2>
      <label>
        Session Name:
        <input type="text" id="export-name" placeholder="My Thinking Session">
      </label>
      <label>
        Email (for Drive sharing):
        <input type="email" id="export-email" placeholder="you@example.com">
      </label>
      <div class="modal-actions">
        <button id="btn-export-github" class="btn btn-primary">Export to GitHub</button>
        <button id="btn-export-drive" class="btn btn-secondary">Export to Drive</button>
        <button id="btn-export-cancel" class="btn btn-ghost">Cancel</button>
      </div>
      <div id="export-status"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
